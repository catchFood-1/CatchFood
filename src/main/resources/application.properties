spring.application.name=CatchFood

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/catchfood
spring.datasource.username=root
spring.datasource.password=12345

mybatis.mapper-locations=classpath:mybatis/mapper/**/**.xml
mybatis.type-aliases-package=com.catchfood.dto

upload.path=C:/catchfood-uploads/


spring.web.resources.static-locations=classpath:/static/,file:///C:/catchfood-uploads/